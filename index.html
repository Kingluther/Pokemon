<!doctype html>
<html lang='fr'>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Pokédex - Les Illusions de Zorua</title>
    
    <style>
        /* --- DESIGN INSPIRÉ DU POKÉDEX NINTENDO --- */
        body {
            font-family: 'Arial Rounded MT Bold', 'Helvetica', sans-serif;
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 50%, #962d22 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            color: #333;
            overflow-x: hidden;
        }

        .bg-hexagons {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.15;
        }

        .progress-container {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background-color: #2c3e50;
            color: #f1c40f;
            padding: 6px 0;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 1000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
        }

        .container {
            max-width: 800px;
            margin: 100px auto 20px; 
            background-color: #f5f5f5;
            border: 6px solid #34495e;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        /* --- GRILLE & FORMAT PORTRAIT --- */
        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .pokemon-card {
            position: relative;
            border: 4px solid #bdc3c7;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            width: 100%;
            aspect-ratio: 3 / 4; /* NOUVEAU : Format portrait */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        
        /* NOUVEAU : Zoom 150% lors de la sélection */
        .pokemon-card.selected {
            border-color: #f1c40f;
            transform: scale(1.5);
            z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .pokemon-card img { 
            width: 85%; 
            height: 85%; 
            object-fit: contain;
        }

        /* --- ANIMATION SCAN 3.5s --- */
        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: #2ecc71;
            display: none;
            z-index: 10;
        }
        .scanning .scan-line {
            display: block;
            animation: scan-animation 3.5s linear infinite; 
        }
        @keyframes scan-animation { 
            0% { top: 0%; } 
            100% { top: 100%; } 
        }

        /* --- BOUTONS & TERMINAL --- */
        .btn-validate { display: block; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px;}
        .btn-default { background-color: #95a5a6; color: white; }
        .btn-validated { background-color: #3498db; color: white; }

        .pokedex-terminal {
            background-color: #111;
            color: #2ecc71;
            font-family: 'Courier New', monospace;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }
    </style>
</head>
<body>

<svg class="bg-hexagons" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
    <defs>
        <pattern id="hex" width="56" height="97" patternUnits="userSpaceOnUse" patternTransform="scale(1)">
            <path d="M28 0 L56 16 L56 48 L28 64 L0 48 L0 16 Z" fill="none" stroke="white" stroke-width="1"/>
            <path d="M0 97 L28 81 L56 97" fill="none" stroke="white" stroke-width="1"/>
        </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#hex)"/>
</svg>

<div class="progress-container">⚡ POKÉDEX SYSTEM v4.3 ⚡</div>

<!-- SECTION EXEMPLE (Les autres chapitres restent identiques) -->
<section class="container" id="chapitre2">
    <h2>Analyse du Pokémon</h2>
    <div class="pokemon-grid" id="grid-ch2"></div>
    <div class="pokedex-terminal" id="term-ch2"></div>
    <button class="btn-validate btn-default" id="btn-ch2" onclick="startScanningProcess(2, 'Pikachu')">Analyser le Pokémon 🔎</button>
</section>

<script>
    // Initialisation
    const CHAPTER_DATA = {
        2: { pokemons: [{ name: 'Pikachu', img: 'pikachu.png' }, { name: 'Grelaçon', img: 'grelacon.png' }, { name: 'Miasmax', img: 'miasmax.png' }, { name: 'Hexadron', img: 'hexadron.png' }, { name: 'Charibari', img: 'charibari.png' }, { name: 'Soporifik', img: 'soporifik.png' }] }
    };

    function generateGrid(chapterNum) {
        const grid = document.getElementById(`grid-ch${chapterNum}`);
        CHAPTER_DATA[chapterNum].pokemons.forEach(poke => {
            const card = document.createElement('div');
            card.className = 'pokemon-card';
            card.innerHTML = `<div class="scan-line"></div><img src="${poke.img}" alt="${poke.name}">`;
            card.onclick = () => {
                document.querySelectorAll('.pokemon-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                card.setAttribute('data-name', poke.name);
            };
            grid.appendChild(card);
        });
    }

    function startScanningProcess(chapterNum, correctName) {
        const selected = document.querySelector('.pokemon-card.selected');
        const terminal = document.getElementById(`term-ch${chapterNum}`);
        
        if (!selected) return alert("Choisis un Pokémon !");

        // Animation Scan
        selected.classList.add('scanning');
        terminal.style.display = "block";
        terminal.scrollIntoView({ behavior: 'smooth', block: 'center' });
        terminal.innerHTML = "SCAN EN COURS...<br>Analyse des fréquences...";

        // Simulation durée 3.5s
        setTimeout(() => {
            terminal.innerHTML = "ANALYSE TERMINEE<br>Type : Détecté.<br>Verdict : Succès.";
            selected.classList.remove('scanning');
            // Logique de validation ici...
        }, 3500);
    }

    window.onload = () => generateGrid(2);
</script>

</body>
</html>
